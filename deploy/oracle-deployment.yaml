apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trading-db-pvc
  namespace: trading-desk
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: oci-bv # Correctly mounts OCI Block Volumes
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-daemon
  namespace: trading-desk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-daemon
  template:
    metadata:
      labels:
        app: backend-daemon
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
      - name: backend
        # ─── FIXED: Swapped typo repo name (_) to your actual OCIR repo structure (/) ───
        image: iad.ocir.io/idqcoec1tv4k/trading-system/backend:v7-multiarch
        imagePullPolicy: Always
        command: ["python"]
        args: ["main.py"]
        ports:
        - name: http-metrics
          containerPort: 8080
        env:
        - name: BROKER_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-env-secret
              key: BROKER_API_KEY
        - name: BROKER_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trading-env-secret
              key: BROKER_SECRET_KEY
        - name: BROKER_ENV
          valueFrom:
            secretKeyRef:
              name: trading-env-secret
              key: BROKER_ENV
        volumeMounts:
        - name: db-volume
          # ─── FIXED: Aligned target folder with the active prototype path structure ───
          mountPath: /app/logs
      volumes:
      - name: db-volume
        persistentVolumeClaim:
          claimName: trading-db-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-ui
  namespace: trading-desk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-ui
  template:
    metadata:
      labels:
        app: dashboard-ui
    spec:
      imagePullSecrets:
        - name: ocir-secret
      securityContext:
        runAsUser: 0
      containers:
      - name: dashboard
        # ─── FIXED: Corrected path name typo and synchronized the release tags ───
        image: iad.ocir.io/idqcoec1tv4k/trading-system/dashboard:v7-multiarch
        ports:
        - containerPort: 8501 # ─── FIXED: Reverted to Streamlit's structural engine port ───
        env:
        - name: BACKEND_HOST # ─── FIXED: Aligned variable naming keys with your config/settings.py ───
          value: "backend-daemon"
        - name: BACKEND_PORT
          value: "8080"
        - name: STREAMLIT_SERVER_PORT
          value: "8501" # ─── FIXED: Mapped to standard non-privileged port to avoid crash cycles ───
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        - name: STREAMLIT_SERVER_HEADLESS
          value: "true"
        - name: STREAMLIT_SERVER_ENABLE_CORS
          value: "false"
        - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
          value: "false"
        - name: STREAMLIT_BROWSER_SERVER_PORT
          value: "443"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-lb
  namespace: trading-desk
  annotations:
    service.beta.kubernetes.io/oci-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/oci-load-balancer-tls-secret: "dashboard-tls-secret"
    service.beta.kubernetes.io/oci-load-balancer-backend-ssl-ports: ""
spec:
  type: LoadBalancer
  loadBalancerIP: 129.153.166.6
  ports:
  - name: http
    port: 80
    targetPort: 8501 # ─── FIXED: Routes public HTTP directly to internal Streamlit listener ───
  - name: https
    port: 443
    targetPort: 8501 # ─── FIXED: Routes secure HTTPS directly to internal Streamlit listener ───
  selector:
    app: dashboard-ui
---
apiVersion: v1
kind: Service
metadata:
  name: backend-daemon
  namespace: trading-desk
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: backend-daemon
