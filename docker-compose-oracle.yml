networks:
  trading_mesh:
    driver: bridge

volumes:
  shared_logs:
    driver: local
  trading_db_data:
    driver: local

services:
  # 1. Microservice 1: The Core Async Execution Engine Daemon
  backend-daemon:
    image: iad.ocir.io/idqcoec1tv4k/trading-system/backend:v7-multiarch
    container_name: trading_backend_daemon
    restart: always
    networks:
      - trading_mesh
    ports:
      - "8080:8080"
    volumes:
      - shared_logs:/app/logs
      - trading_db_data:/app/data
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - BROKER_ENV=paper
      - TARGET_SYMBOL=AAPL
      - DEFAULT_QTY=50
      - RSI_PERIOD=14
      - RSI_OVERBOUGHT=70.0
      - RSI_OVERSOLD=30.0
      - ML_CONFIDENCE_THRESHOLD=0.65

  # 2. Microservice 2: The Streamlit Visual Frontend Interface Application
  dashboard-ui:
    image: iad.ocir.io/idqcoec1tv4k/trading-system/dashboard:v7-multiarch
    container_name: trading_streamlit_ui
    restart: always
    networks:
      - trading_mesh
    ports:
      - "8501:8501"
    depends_on:
      - backend-daemon
    env_file:
      - .env
    environment:
      - BACKEND_HOST=backend-daemon
      - BACKEND_PORT=8080
