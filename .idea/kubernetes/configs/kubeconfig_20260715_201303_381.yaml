apiVersion: v1
kind: Config
preferences: {}

# 1. CLUSTERS: Defines the network endpoints for both backends
clusters:
- cluster:
    certificate-authority-data: 
    server: https://0.0.0
  name: k3d-trading-local
- cluster:
    server: https://129.158.222.12:6443
  name: cluster-c7asmvkmmka

# 2. CONTEXTS: Ties the clusters and users together into switchable targets
contexts:
- context:
    cluster: k3d-trading-local
    user: admin@k3d-trading-local
  name: k3d-trading-local
- context:
    cluster: cluster-c7asmvkmmka
    user: user-c7asmvkmmka
  name: context-c7asmvkmmka

# 3. CURRENT CONTEXT: Tells kubectl who to talk to by default
current-context: k3d-trading-local

# 4. USERS: Authentication tokens/scripts for both environments
users:
- name: admin@k3d-trading-local
  user:
    client-certificate-data: 
    client-key-data: 
- name: user-c7asmvkmmka
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1beta1
      # Crucial: This absolute path ensures PyCharm bypasses your python .venv and finds the global binary
      command: /usr/bin/oci
      args:
      - ce
      - cluster
      - generate-token
      - --cluster-id
      - ocid1.cluster.oc1.iad.aaaaaaaalxnpisdo25xgse33hncvd4yp4lhfm6swvirjc76omc7asmvkmmka
      env: []
